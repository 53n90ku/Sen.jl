name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Julia 1.12 smoke - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    env:
      JULIA_NUM_THREADS: 4
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Validate frozen engine contract
        run: julia --project=. scripts/validate_engine_contract.jl --enforce
      - name: Test engine contract validator
        run: julia --project=. scripts/test_engine_contract.jl
      - name: Instantiate benchmark environment
        run: julia --project=benchmark/SenBench -e 'using Pkg; Pkg.instantiate()'
      - name: Enforce recall and latency contract
        run: julia --project=benchmark/SenBench scripts/validate_quality_contract.jl
      - name: Enforce crash recovery contract
        run: julia --project=. scripts/test_crash_recovery.jl
      - name: Verify semantic-search example
        run: |
          julia --project=examples -e 'using Pkg; Pkg.instantiate()'
          julia --project=examples examples/test_semantic_search.jl
      - name: Validate release metadata and API
        run: julia --project=. scripts/validate_release.jl --skip-tests
      - name: Run full package tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'
