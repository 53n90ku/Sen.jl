format_version = 1
contract_version = "1.0.0"
contract_state = "accepted"
scope = "embedded_single_node_vector_search_engine"
claim = "Sen stores vectors durably, supports exact and approximate filtered top-k search, accepts continuous mutations without unbounded search degradation, and operates under an explicit recall and latency contract."

[policy]
allowed_statuses = ["pass", "partial", "fail"]
engine_claim_requires_all_gates = true
validation_command = "julia --project=. scripts/validate_engine_contract.jl"
enforcement_command = "julia --project=. scripts/validate_engine_contract.jl --enforce"

[[gates]]
id = "search_primitives"
title = "Exact and approximate filtered search"
requirement = "Exact top-k, IVF approximate top-k, metadata filtering, and deterministic result merging are implemented and tested."
status = "pass"
stage = 0
evidence = ["test/search/test_exact.jl", "test/search/test_ivf.jl", "test/filters/test_expression_exact_ivf.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "durable_storage"
title = "Durable acknowledged mutations"
requirement = "Acknowledged mutations survive normal restart and supported WAL crash boundaries."
status = "pass"
stage = 0
evidence = ["test/persistence/test_wal.jl", "test/persistence/test_database_persistence.jl", "src/storage/wal_store.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "mutation_visibility"
title = "Logical mutation visibility"
requirement = "Insert, upsert, update, and delete operations remain visible to exact and indexed searches before and after persistence."
status = "pass"
stage = 0
evidence = ["test/mutations/test_mutations.jl", "test/mutations/test_delta.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "valid_vector_admission"
title = "Safe vector admission"
requirement = "Every accepted vector and query is finite, Float32-representable, dimensionally valid, and nonzero when required by the metric."
status = "pass"
stage = 1
evidence = ["src/vector_validation.jl", "src/api.jl", "test/core/test_api.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "writable_reopen"
title = "Writable databases remain writable after reopen"
requirement = "A saved database reopened with any supported mmap mode accepts insert, upsert, update, and delete operations."
status = "pass"
stage = 1
evidence = ["src/storage/vector_store.jl", "test/persistence/test_database_persistence.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "atomic_mutations"
title = "Exception-safe atomic mutations"
requirement = "Validation or injected failures cannot leave WAL, vectors, metadata, IDs, revisions, or indexes in a partially committed state."
status = "pass"
stage = 1
evidence = ["src/api.jl", "src/storage/wal_store.jl", "test/persistence/test_wal.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "continuous_write_indexing"
title = "Indexing completes under continuous writes"
requirement = "Background index construction can publish a valid generation while newer acknowledged writes remain searchable."
status = "pass"
stage = 2
evidence = ["src/api.jl", "src/maintenance.jl", "src/types.jl", "test/maintenance/test_maintenance.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "bounded_mutation_search_cost"
title = "Mutation search cost is bounded"
requirement = "Unindexed mutation work per query is bounded by configuration and does not grow without limit between successful background indexing operations."
status = "pass"
stage = 2
evidence = ["src/api.jl", "src/storage/delta_store.jl", "src/observability.jl", "test/maintenance/test_maintenance.jl", "test/core/test_database_info.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"

[[gates]]
id = "recall_latency_contract"
title = "Measured recall and latency contract"
requirement = "Each approximate strategy has held-out recall and latency gates keyed by metric, dimension, index version, and workload, including unfiltered search."
status = "pass"
stage = 3
evidence = ["quality_contract.toml", "benchmark/SenBench/src/quality_contract.jl", "scripts/validate_quality_contract.jl", "benchmark/SenBench/test/cases/test_protocol.jl"]
verification = "julia --project=benchmark/SenBench scripts/validate_quality_contract.jl"

[[gates]]
id = "crash_recovery_contract"
title = "Fault-injected crash recovery"
requirement = "A mutation killed before WAL append may be absent; after WAL fsync it must survive. Recovery remains writable across process termination, truncated writes, corrupted snapshots, disk-full failures, and checkpoint boundaries."
status = "pass"
stage = 3
evidence = ["src/storage/fault_injection.jl", "scripts/crash_worker.jl", "scripts/test_crash_recovery.jl", "test/persistence/test_database_persistence.jl"]
verification = "julia --project=. scripts/test_crash_recovery.jl"

[[gates]]
id = "full_tests_in_ci"
title = "Full test suite is mandatory in CI"
requirement = "Every supported CI platform runs the complete package test suite and blocks changes on failure."
status = "pass"
stage = 1
evidence = [".github/workflows/ci.yml", "test/runtests.jl"]
verification = "julia --project=. -e 'using Pkg; Pkg.test()'"
